version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-creator-backend
    ports:
      - "8000:8000"
      # Port range for running projects (10000-10099)
      - "10000-10099:10000-10099"
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
      - DOCKER_HOST=unix:///var/run/docker.sock
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./storage:/app/storage
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Runtime workspace for building projects
      - runtime_workspace:/tmp/runtime_workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Required for Docker-in-Docker
    privileged: true

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-creator-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: ai-creator-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    profiles:
      - production

volumes:
  data:
  uploads:
  runtime_workspace:
    driver: local
